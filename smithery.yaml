name: opendartmcp
displayName: OpenDART API MCP Server
description: MCP server for South Korea's OpenDART API (금융감독원 전자공시). 83 tools covering stock disclosures, financial statements, shareholder reports, and more.
homepage: https://github.com/gyeongmin100/Open-Dart-MCP
license: MIT

startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - dartApiKey
    properties:
      dartApiKey:
        type: string
        description: OpenDART API 인증키 (https://opendart.fss.or.kr 에서 발급)
  commandFunction: |-
    (config) => ({
      command: "uvx",
      args: ["opendartmcp"],
      env: {
        DART_API_KEY: config.dartApiKey,
      },
    })
