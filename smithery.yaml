name: opendartmcp
displayName: OpenDART API MCP Server
description: 금융감독원 전자공시(OpenDART) API를 MCP 프로토콜로 제공하는 서버. 공시검색, 재무제표, 지분공시 등 84개 툴 제공.
homepage: https://github.com/gyeongmin100/Open-Dart-MCP
license: MIT

startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - dartApiKey
    properties:
      dartApiKey:
        type: string
        description: OpenDART API 인증키 (https://opendart.fss.or.kr 에서 발급)
  commandFunction: |-
    (config) => ({
      command: "uvx",
      args: ["opendartmcp"],
      env: {
        DART_API_KEY: config.dartApiKey,
      },
    })
